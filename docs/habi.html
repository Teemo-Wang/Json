<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#0a0e1a;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
.page{display:none;min-height:100vh}.page.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
#landing{text-align:center;padding:40px 20px;background:radial-gradient(ellipse at 50% 40%,#0d2137,#0a0e1a 70%)}
.logo-icon{font-size:4rem;margin-bottom:12px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:clamp(3rem,12vw,6rem);font-weight:900;background:linear-gradient(135deg,#4fc3f7,#00e5ff,#4fc3f7);background-size:200% 200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:glow 3s ease infinite;letter-spacing:8px}
@keyframes glow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.sub{font-size:clamp(.85rem,2.8vw,1.2rem);color:#7a8a9e;margin:12px 0 48px;line-height:1.8}.sub span{color:#4fc3f7}
.btn{padding:16px 56px;font-size:1.15rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#4fc3f7,#0288d1);border:none;border-radius:50px;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 28px rgba(79,195,247,.3);font-family:inherit}
.btn:hover{transform:scale(1.05);box-shadow:0 6px 36px rgba(79,195,247,.45)}.btn:active{transform:scale(.97)}
.credit{margin-top:48px;font-size:.75rem;color:#3a4a5e;line-height:2.2}
.pbar{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,#4fc3f7,#00e5ff);transition:width .4s ease;z-index:100;width:0;box-shadow:0 0 12px rgba(0,229,255,.4)}
#quiz{padding:20px;max-width:640px;width:100%;margin:0 auto;justify-content:flex-start;padding-top:60px}
.qc{font-size:.85rem;color:#4a5a6e;margin-bottom:8px;text-align:center}.qc b{color:#4fc3f7}
.qt{font-size:clamp(1.1rem,4vw,1.45rem);font-weight:700;text-align:center;margin-bottom:32px;line-height:1.8;min-height:3em;color:#e8f0f8}
.opts{display:flex;flex-direction:column;gap:12px}
.ob{width:100%;padding:16px 20px;font-size:1rem;color:#b0c4d8;background:rgba(79,195,247,.04);border:1px solid rgba(79,195,247,.12);border-radius:14px;cursor:pointer;transition:all .25s;text-align:left;line-height:1.6;font-family:inherit}
.ob:hover{background:rgba(79,195,247,.1);border-color:rgba(79,195,247,.4);color:#e0f0ff;transform:translateX(4px)}
.ob.sel{background:rgba(79,195,247,.18);border-color:#4fc3f7;color:#fff;pointer-events:none}
.back{display:inline-block;margin-top:20px;padding:10px 24px;font-size:.85rem;color:#4a5a6e;background:none;border:1px solid rgba(79,195,247,.15);border-radius:30px;cursor:pointer;font-family:inherit;transition:all .2s}.back:hover{color:#4fc3f7;border-color:#4fc3f7}
#result{padding:40px 20px;max-width:640px;width:100%;margin:0 auto;justify-content:flex-start;padding-top:40px}
.rc{background:linear-gradient(145deg,rgba(79,195,247,.06),rgba(2,136,209,.02));border:1px solid rgba(79,195,247,.1);border-radius:24px;padding:36px 28px;text-align:center;margin-bottom:24px}
.re{font-size:4.5rem;margin-bottom:12px}.rtl{font-size:.82rem;color:#5a7a9e;margin-bottom:4px;letter-spacing:2px}
.rt{font-size:2.4rem;font-weight:900;background:linear-gradient(135deg,#4fc3f7,#00e5ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;letter-spacing:4px}
.rn{font-size:1.1rem;color:#8ab4d8;margin-bottom:20px}
.mb{width:80%;margin:0 auto 8px;height:8px;background:rgba(79,195,247,.08);border-radius:4px;overflow:hidden}
.mf{height:100%;background:linear-gradient(90deg,#4fc3f7,#00e5ff);border-radius:4px;transition:width 1.5s ease}
.mt{font-size:.85rem;color:#5a7a9e;margin-bottom:24px}
.rd{font-size:.95rem;color:#9ab0c8;line-height:2;text-align:left}
.radar-wrap{margin:28px auto 0;text-align:center}
.radar-wrap h3{font-size:.88rem;color:#5a7a9e;margin-bottom:16px;letter-spacing:2px}
canvas.radar{display:block;margin:0 auto}
.dims{margin-top:20px}
.dr{display:flex;align-items:center;margin-bottom:10px;font-size:.82rem}
.dl{width:68px;color:#6a8aae;flex-shrink:0;text-align:right;padding-right:10px}
.db{flex:1;height:6px;background:rgba(79,195,247,.08);border-radius:3px;overflow:hidden}
.df{height:100%;border-radius:3px;transition:width 1.2s ease}
.dv{width:36px;text-align:right;color:#5a7a9e;padding-left:8px}
.tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:24px}
.tag{padding:6px 14px;border-radius:20px;font-size:.78rem;background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.18);color:#4fc3f7}
</style>

<body>
<div class="pbar" id="pb"></div>
<div class="page active" id="landing">
<div class="logo-icon">🚲</div>
<h1>HBTI</h1>
<p class="sub">MBTI 测性格，<span>HBTI 测的是你骑车时的灵魂</span></p>
<button class="btn" id="startBtn">开始骑行</button>
<div class="credit">Hellobike Affective Biking Identity<br>哈啰骑行情感人格测试 · 纯属娱乐</div>
</div>
<div class="page" id="quiz">
<div class="qc"><b id="qn">1</b> / 10</div>
<div class="qt" id="qtx"></div>
<div class="opts" id="qo"></div>

</div>

<div class="rc">
<div class="re" id="rE"></div>
<div class="rtl">你的 HBTI 骑行人格</div>
<div class="rt" id="rT"></div>
<div class="rn" id="rN"></div>
<div class="mb"><div class="mf" id="mF" style="width:0"></div></div>
<div class="mt">匹配度 <span id="mP">0</span>%</div>
<div class="rd" id="rD"></div>
<div class="radar-wrap"><h3>五维骑行雷达</h3><canvas class="radar" id="radarCvs" width="280" height="280"></canvas></div>

</div>
<button class="btn" id="retryBtn" style="width:100%;max-width:640px">再测一次</button>
<div class="credit" style="margin-top:24px;text-align:center">Hellobike Affective Biking Identity · 哈啰骑行情感人格测试 · 纯属娱乐</div>
</div>
<script>
var scores={F:0,W:0,S:0,E:0,P:0},cur=0,ans=[];
var TOTAL=10;

/* 10道骑行场景题目 - 五维: F(自由感) W(温暖度) S(社交力) E(探索欲) P(仪式感) */
var QS=[
{q:"你最喜欢什么时候骑车？",o:[
{t:"清晨五六点，整条路都是我的",d:{F:3,E:1}},
{t:"傍晚下班后，吹吹风放松一下",d:{W:2,P:1}},
{t:"深夜，城市安静得像另一个世界",d:{E:3,F:1}},
{t:"约好朋友的周末下午",d:{S:3,W:1}}
]},
{q:"骑车时你会听什么？",o:[
{t:"必须有歌！骑车不听歌等于没骑",d:{P:3,F:1}},
{t:"什么都不听，就听风声和城市的声音",d:{F:2,E:1}},
{t:"播客或者脱口秀，骑车也要学习",d:{E:2,S:1}},
{t:"跟同行的人聊天就够了",d:{S:3,W:1}}
]},
{q:"遇到上坡你的第一反应？",o:[
{t:"冲！站起来猛蹬，征服它",d:{F:3,E:1}},
{t:"慢慢骑上去，享受这个过程",d:{W:2,P:1}},
{t:"下来推着走，不丢人",d:{W:1,S:1}},
{t:"绕路，一定有更平的路可以走",d:{E:3,F:1}}
]},
{q:"你会把车停在哪？",o:[
{t:"规规矩矩停在停车线内，摆正",d:{P:3,W:1}},
{t:"哪近停哪，赶时间啊",d:{F:2,E:1}},
{t:"找个有树荫的地方，心疼车被晒",d:{W:3,P:1}},
{t:"停在朋友的车旁边，组个方阵",d:{S:3,P:1}}
]},
{q:"骑车时看到好风景你会？",o:[
{t:"停下来拍照发朋友圈",d:{P:3,S:2}},
{t:"放慢速度多看两眼，但不停",d:{F:2,W:1}},
{t:"记住这个地方，下次带朋友来",d:{S:2,W:2}},
{t:"拐进去探索一下，说不定有惊喜",d:{E:3,F:1}}
]},
{q:"你理想的骑行距离是？",o:[
{t:"3公里以内，代步刚好",d:{W:2,P:1}},
{t:"5-10公里，刚好出一身汗",d:{F:2,W:1}},
{t:"越远越好，骑到不认识的地方才刺激",d:{E:3,F:2}},
{t:"不在乎距离，看和谁一起骑",d:{S:3,W:1}}
]},
{q:"下雨天你还骑车吗？",o:[
{t:"骑！雨中骑行超浪漫的好吧",d:{E:2,P:3}},
{t:"看情况，小雨骑，大雨算了",d:{W:2,F:1}},
{t:"绝对不骑，等雨停或者打车",d:{W:2,S:1}},
{t:"专门等下雨去骑，体验不一样的城市",d:{E:3,P:1}}
]},
{q:"你骑车时的表情是？",o:[
{t:"嘴角上扬，忍不住笑",d:{W:3,F:1}},
{t:"面无表情但内心很平静",d:{F:2,P:1}},
{t:"东张西望，好奇宝宝",d:{E:3,S:1}},
{t:"边骑边跟旁边的人说话",d:{S:3,W:1}}
]},
{q:"你会和谁一起骑车？",o:[
{t:"一个人，自由自在不用迁就谁",d:{F:3,E:1}},
{t:"和最好的朋友，边骑边聊",d:{S:3,W:1}},
{t:"和对象，这是我们的浪漫时刻",d:{W:3,P:2}},
{t:"谁都行，路上遇到的陌生人也能聊",d:{S:2,E:2}}
]},
{q:"你觉得骑车最大的意义是？",o:[
{t:"自由，想去哪就去哪，不堵车不挤地铁",d:{F:3,E:1}},
{t:"环保低碳，为地球做一点小事",d:{W:2,P:2}},
{t:"发现城市里那些开车永远看不到的角落",d:{E:3,F:1}},
{t:"和朋友一起骑车的快乐是加倍的",d:{S:3,W:2}}
]}
];

/* 10种骑行人格 */
var TYPES=[
{code:"WIND",name:"风之骑士",emoji:"🌬️",desc:"你骑车的时候，整个世界都在后退。红灯是建议，上坡是挑战，逆风是对手。你享受速度带来的肾上腺素飙升，享受头发被风吹乱的不羁感。你不是在骑车，你是在飞。别人骑车是通勤，你骑车是一场和城市的竞速赛。你的哈啰单车如果有里程排行榜，你一定在前三。",dims:{F:3,W:-2,S:-1,E:1,P:-1},tags:["速度即正义","风一样的骑手","红灯是建议"]},
{code:"SLOW",name:"慢时光旅人",emoji:"🐌",desc:"你骑车从来不赶时间。别人三分钟的路你能骑十分钟，不是因为你慢，是因为你在享受。路边的花开了你要看看，猫咪晒太阳你要停下来撸两下。你的骑行速度和你的生活态度一样——慢慢来，比较快。你是这个焦虑时代里最稀缺的存在：一个真正会享受当下的人。",dims:{F:1,W:3,S:0,E:0,P:2},tags:["慢即是快","路边的花都认识","人间值得"]},
{code:"RAIN",name:"雨中浪漫家",emoji:"🌧️",desc:"别人下雨天叫车，你下雨天骑车。你觉得雨滴打在脸上是大自然的亲吻，积水溅起来是免费的水上乐园。你的朋友觉得你疯了，但你知道——雨中的城市有一种平时看不到的美。你不怕淋湿，你怕的是错过每一种天气里不同的风景。你的衣柜里一定有一件随时准备出发的雨衣。",dims:{F:1,W:-1,S:-2,E:3,P:3},tags:["什么天气都骑","雨衣常备","浪漫到淋湿"]},
{code:"DAWN",name:"晨光追逐者",emoji:"🌅",desc:"当整个城市还在睡梦中，你已经骑上了哈啰单车。清晨五六点的街道是你的私人赛道，第一缕阳光是你的专属灯光。你享受那种「整个世界都是我的」的感觉。早起骑行不是自律，是你和这座城市的秘密约会。你的朋友圈里全是晨光和空旷的街道，配文永远是「早安」。",dims:{F:2,W:2,S:-1,E:1,P:3},tags:["五点起床不是梦","晨光收集者","城市早鸟"]},
{code:"SONG",name:"骑行DJ",emoji:"🎵",desc:"没有BGM的骑行是没有灵魂的。你的耳机是骑行装备的一部分，你的歌单是按骑行场景分类的——上坡有战歌，下坡有嗨曲，夜骑有氛围感音乐。你骑车的节奏完全跟着音乐走，遇到副歌高潮的时候你会不自觉地加速。你不是在骑车，你是在拍自己的公路电影。",dims:{F:1,W:1,S:0,E:1,P:3},tags:["骑车必戴耳机","人形点唱机","公路电影主角"]},
{code:"SNAP",name:"街拍骑手",emoji:"📸",desc:"你的骑行路线不是按距离规划的，是按拍照点规划的。每次骑车你的手机电量都会掉30%，因为你一直在拍拍拍。路边的涂鸦、转角的咖啡店、夕阳下的天际线——你的眼睛就是取景框，你的哈啰单车就是你的移动摄影棚。你的朋友圈是一本城市影集，而你是这座城市最勤劳的记录者。",dims:{F:0,W:1,S:2,E:2,P:3},tags:["骑到哪拍到哪","手机电量杀手","城市记录者"]},
{code:"PACK",name:"组队骑行家",emoji:"👥",desc:"一个人骑车？不存在的。你每次骑车都要拉上三五好友，浩浩荡荡出发。你是那个在群里发「今天有人一起骑车吗」的人，你是那个骑在最前面回头喊「跟上跟上」的人。对你来说，骑车不是交通方式，是社交活动。你的快乐不是来自骑行本身，而是来自和朋友们一起骑行的那种热闹感。",dims:{F:-1,W:2,S:3,E:1,P:1},tags:["不落单骑手","群里活跃分子","快乐要分享"]},
{code:"LOST",name:"迷路探险家",emoji:"🗺️",desc:"你骑车从来不看导航。左转还是右转？看心情。前面有条没走过的小巷？拐进去。你享受的就是那种「不知道下一秒会看到什么」的刺激感。你在这座城市生活了好几年，但你发现的隐藏角落比本地人还多。你的骑行轨迹画出来大概是一团毛线球，但每一段都是独一无二的冒险。",dims:{F:1,W:-1,S:-1,E:3,P:-2},tags:["导航是什么","城市探险家","每次都迷路"]},
{code:"WARM",name:"暖心摆渡人",emoji:"💛",desc:"你是那种会把车让给别人骑的人。看到有人在路边等车等不到，你会说「要不你骑我这辆」。你骑车的时候会主动避让行人，会给迷路的人指路，会帮老人把倒了的共享单车扶起来。你骑车不只是为了自己，你是在用一种温柔的方式和这个世界互动。你是城市里最温暖的骑行者。",dims:{F:0,W:3,S:2,E:0,P:1},tags:["移动暖宝宝","顺路载你一程","城市温度计"]},
{code:"ZEN",name:"禅意骑行者",emoji:"🧘",desc:"你骑车的时候脑子里什么都不想。不想工作，不想烦恼，不想明天的deadline。踩踏板的节奏就是你的呼吸节奏，车轮转动的声音就是你的白噪音。你把骑行当成移动冥想，每一次出发都是一次心灵的重启。别人问你为什么喜欢骑车，你说不出具体原因——因为那种感觉，只有骑上去才知道。",dims:{F:2,W:1,S:-2,E:0,P:2},tags:["移动冥想室","脑子放空中","骑行即修行"]}
];

/* 维度名称和颜色 */
var DN={F:"自由感",W:"温暖度",S:"社交力",E:"探索欲",P:"仪式感"};
var DC={F:"#4fc3f7",W:"#ffb74d",S:"#81c784",E:"#ba68c8",P:"#e57373"};
var DK=["F","W","S","E","P"];

/* 页面切换 */
function show(id){document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});document.getElementById(id).classList.add("active")}

/* 渲染题目 */
function render(){
var q=QS[cur];
document.getElementById("qn").textContent=cur+1;
document.getElementById("qtx").textContent=q.q;
document.getElementById("pb").style.width=(cur/TOTAL*100)+"%";
var box=document.getElementById("qo");
box.innerHTML="";
q.o.forEach(function(opt,i){
var b=document.createElement("button");
b.className="ob";b.textContent=opt.t;
b.onclick=function(){pick(i)};
box.appendChild(b);
});
window.scrollTo(0,0);
document.getElementById("backBtn").style.display=cur>0?"inline-block":"none";
}

/* 选择答案 */
function pick(i){
var btns=document.getElementById("qo").children;
for(var j=0;j<btns.length;j++)btns[j].classList.remove("sel");
btns[i].classList.add("sel");
var d=QS[cur].o[i].d;
ans.push({idx:cur,d:d});
for(var k in d)scores[k]=(scores[k]||0)+d[k];
cur++;
setTimeout(function(){if(cur>=TOTAL)finish();else render();},300);
}

/* 余弦相似度匹配 */
function finish(){
document.getElementById("pb").style.width="100%";
var best=null,bs=-999;
TYPES.forEach(function(t){
var dot=0,mA=0,mB=0;
DK.forEach(function(k){
var a=scores[k]||0,b=t.dims[k]||0;
dot+=a*b;mA+=a*a;mB+=b*b;
});
mA=Math.sqrt(mA);mB=Math.sqrt(mB);
var sim=(mA&&mB)?(dot/(mA*mB)):0;
if(sim>bs){bs=sim;best=t}
});
var pct=Math.round(65+bs*33);
if(pct>98)pct=98;if(pct<65)pct=65;
showResult(best,pct);
}

/* 绘制雷达图 */
function drawRadar(vals){
var cvs=document.getElementById("radarCvs");
var ctx=cvs.getContext("2d");
var W=cvs.width,H=cvs.height;
var cx=W/2,cy=H/2,R=100;
var n=DK.length;
var step=Math.PI*2/n;
var startAngle=-Math.PI/2;
ctx.clearRect(0,0,W,H);
/* 背景网格 */
[.25,.5,.75,1].forEach(function(s){
ctx.beginPath();
for(var i=0;i<=n;i++){
var a=startAngle+step*i;
var x=cx+Math.cos(a)*R*s;
var y=cy+Math.sin(a)*R*s;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.closePath();
ctx.strokeStyle="rgba(79,195,247,.12)";
ctx.lineWidth=1;
ctx.stroke();
});
/* 轴线 */
for(var i=0;i<n;i++){
var a=startAngle+step*i;
ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
ctx.strokeStyle="rgba(79,195,247,.1)";
ctx.stroke();
}
/* 数据区域 */
ctx.beginPath();
for(var i=0;i<=n;i++){
var idx=i%n;
var a=startAngle+step*idx;
var v=vals[idx]/100;
var x=cx+Math.cos(a)*R*v;
var y=cy+Math.sin(a)*R*v;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.closePath();
ctx.fillStyle="rgba(79,195,247,.15)";
ctx.fill();
ctx.strokeStyle="#4fc3f7";
ctx.lineWidth=2;
ctx.stroke();
/* 数据点 */
for(var i=0;i<n;i++){
var a=startAngle+step*i;
var v=vals[i]/100;
var x=cx+Math.cos(a)*R*v;
var y=cy+Math.sin(a)*R*v;
ctx.beginPath();
ctx.arc(x,y,4,0,Math.PI*2);
ctx.fillStyle="#00e5ff";
ctx.fill();
}
/* 标签 */
ctx.font="12px -apple-system,PingFang SC,sans-serif";
ctx.fillStyle="#7a9abe";
ctx.textAlign="center";
ctx.textBaseline="middle";
for(var i=0;i<n;i++){
var a=startAngle+step*i;
var lx=cx+Math.cos(a)*(R+22);
var ly=cy+Math.sin(a)*(R+22);
ctx.fillText(DN[DK[i]],lx,ly);
}
}

/* 展示结果 */
function showResult(t,pct){
show("result");
document.getElementById("rE").textContent=t.emoji;
document.getElementById("rT").textContent=t.code;
document.getElementById("rN").textContent=t.name;
document.getElementById("rD").textContent=t.desc;
document.getElementById("mP").textContent=pct;
setTimeout(function(){document.getElementById("mF").style.width=pct+"%"},200);
/* 计算各维度百分比 */
var dimVals=[];
var dh=document.getElementById("dims");
dh.innerHTML="";
DK.forEach(function(k,idx){
var v=scores[k]||0;
var pv=Math.round(Math.min(100,Math.max(5,(v+8)/16*100)));
dimVals.push(pv);
var row=document.createElement("div");row.className="dr";
row.innerHTML='<div class="dl">'+DN[k]+'</div><div class="db"><div class="df" style="width:0;background:'+DC[k]+'"></div></div><div class="dv">'+pv+'</div>';
dh.appendChild(row);
setTimeout(function(){row.querySelector(".df").style.width=pv+"%"},400+idx*100);
});
/* 绘制雷达图 */
setTimeout(function(){drawRadar(dimVals)},300);
/* 标签 */
var tg=document.getElementById("tags");tg.innerHTML="";
(t.tags||[]).forEach(function(l){var s=document.createElement("span");s.className="tag";s.textContent="#"+l;tg.appendChild(s)});
}

/* 事件绑定 */
document.getElementById("startBtn").onclick=function(){show("quiz");render()};
document.getElementById("retryBtn").onclick=function(){location.reload()};
document.getElementById("backBtn").onclick=function(){
if(cur<=0)return;
var last=ans.pop();
var d=last.d;
for(var k in d)scores[k]=(scores[k]||0)-d[k];
cur=last.idx;
render();
};
</script>
</body>
